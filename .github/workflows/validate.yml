name: validate-posts

on:
  pull_request:
    paths:
      - 'content/blog/**'
      - 'scripts/validate_post.py'
      - 'scripts/check_i18n_parity.py'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'all | diff'
        required: true
        default: 'diff'

permissions:
  contents: read

env:
  HUGO_VERSION: '0.160.1'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Decidir alvo (diff vs all)
        id: target
        shell: bash
        run: |
          # Push e PR validam so o DIFF: os gates evoluem (diagrama, paridade EN,
          # fact-check) e nao devem reprovar o acervo antigo retroativamente.
          # Auditoria completa continua disponivel: workflow_dispatch mode=all.
          MODE="${{ github.event.inputs.mode }}"
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "push" ] || [ "$MODE" = "diff" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ]; then BASE="HEAD^"; fi
            # Lista NUL-delimited gravada em arquivo: nomes de arquivo vindos
            # do diff de PR sao input nao-confiavel — nunca interpolar em shell.
            git diff --name-only -z "$BASE" "$HEAD" -- 'content/blog/**/index*.md' > /tmp/changed_files.zlist || true
            if [ -s /tmp/changed_files.zlist ]; then
              echo "mode=diff" >> "$GITHUB_OUTPUT"
              echo "has_files=true" >> "$GITHUB_OUTPUT"
            else
              echo "mode=diff" >> "$GITHUB_OUTPUT"
              echo "has_files=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "mode=all" >> "$GITHUB_OUTPUT"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validar (diff)
        if: steps.target.outputs.mode == 'diff' && steps.target.outputs.has_files == 'true'
        shell: bash
        run: |
          xargs -0 -r -n1 python scripts/validate_post.py < /tmp/changed_files.zlist

      - name: Validar (all)
        if: steps.target.outputs.mode == 'all'
        run: python scripts/validate_post.py content/blog

      - name: Sem posts alterados
        if: steps.target.outputs.mode == 'diff' && steps.target.outputs.has_files == 'false'
        run: echo "Nenhum post alterado no diff. Skip."

  i18n-parity:
    # Guarda contra o incidente de 2026-06/07: 12 posts PT ficaram semanas sem
    # EN porque nada cobrava o par. Roda no acervo INTEIRO (barato, ~1s) — par
    # quebrado e drift estrutural falham o CI mesmo se o post nao esta no diff.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Paridade PT<->EN (index.md x index.en.md)
        run: python scripts/check_i18n_parity.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Hugo ${{ env.HUGO_VERSION }} (extended)
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Smoke build (template/frontmatter quebrado falha aqui, nao no deploy)
        run: hugo --minify --baseURL "https://vazdeng.pages.dev/"
