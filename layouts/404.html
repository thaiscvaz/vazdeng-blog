{{ define "main" }}
<section class="vz-hero" style="text-align: center; padding: 96px 24px;">
  <div class="vz-hero-pill" style="margin: 0 auto 24px;">
    <span class="dot"></span>HTTP 404
  </div>
  <h1 class="vz-hero-title" style="font-style: italic;">
    {{ T "notFoundTitle" }}
  </h1>
  <p class="vz-hero-lead" style="margin: 16px auto 40px; max-width: 480px;">
    {{ T "notFoundLead" }}
  </p>
  <a href="{{ "/" | relLangURL }}" class="vz-404-cta">{{ T "notFoundCta" }}</a>
</section>
{{ end }}
