# Hugo config para o blog VazDEng.
# Cloudflare Pages é o host principal. GitHub Actions sobrescreve via --baseURL dinâmico.
# Local dev: --baseURL http://localhost:1313/
baseURL: https://vazdeng.pages.dev/
title: VazDEng
languageCode: pt-BR
defaultContentLanguage: pt
enableRobotsTXT: false  # static/robots.txt é a fonte da verdade
enableGitInfo: false

# Hextra via Hugo Modules
module:
  imports:
    - path: github.com/imfing/hextra

# Permalink estilo AkitaOnRails
permalinks:
  blog: /:year/:month/:day/:slug/

# Taxonomias: tags (pills) + series (paginas /series/<slug>/ com episodios ordenados)
taxonomies:
  tag: tags
  series: series

# Idiomas (sufixo de arquivo .en.md para inglês)
languages:
  pt:
    languageName: Português
    weight: 1
    params:
      upcoming:
        - date: "QUA 11/06 12h"
          slug: "TV-001"
          title: "Prompt caching: 90% menos custo de LLM"
        - date: "SAB 13/06 10h"
          slug: "ZTE-002"
          title: "Dependências em DAG"
        - date: "SAB 13/06 14h"
          slug: "IA-002"
          title: "A LLM não faz nada. O harness faz."
      tracks:
        - color: amber
          label: "DE Produção"
          title: "Anti-padrões reais em batch e streaming."
          sub: "Decisão técnica com SLA no centro. Toda terça, 12h BRT."
          cta: "Ver últimos"
          sigil: "DE"
        - color: rose
          label: "Cripto Chronicles"
          title: "A saga de um agente quant que perde dinheiro."
          sub: "Capítulos numerados sobre o agente quant de cripto. Sharpe, abstenção, drawdown."
          cta: "Ler do começo"
          sigil: "CA"
        - color: lavender
          label: "Zero to Expert"
          title: "Fundamentos antes da ferramenta."
          sub: "Série didática progressiva de DE. Todo sábado, 10h BRT."
          cta: "Episódio 01"
          sigil: "ZTE"
  en:
    languageName: English
    weight: 2
    params:
      upcoming:
        - date: "WED Jun 11 · 12h"
          slug: "TV-001"
          title: "Prompt caching: 90% lower LLM cost"
        - date: "SAT Jun 13 · 10h"
          slug: "ZTE-002"
          title: "DAG dependencies"
        - date: "SAT Jun 13 · 14h"
          slug: "IA-002"
          title: "The LLM does nothing. The harness does."
      tracks:
        - color: amber
          label: "DE Production"
          title: "Real anti-patterns in batch and streaming."
          sub: "Technical decision with SLA at the center. Every Tuesday, 12h BRT."
          cta: "Latest posts"
          sigil: "DE"
        - color: rose
          label: "Crypto Chronicles"
          title: "The saga of a quant agent losing money."
          sub: "Numbered chapters on the crypto quant agent. Sharpe, abstention, drawdown."
          cta: "Start from chapter 1"
          sigil: "CA"
        - color: lavender
          label: "Zero to Expert"
          title: "Fundamentals before the tool."
          sub: "Progressive didactic series on DE. Every Saturday, 10h BRT."
          cta: "Episode 01"
          sigil: "ZTE"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

# RSS global + saídas
outputs:
  home: [html, rss]
  section: [html, rss]

menu:
  main:
    - name: Sobre
      pageRef: /sobre
      weight: 1
    - name: Séries
      pageRef: /series
      weight: 2
    - name: GitHub
      weight: 3
      url: https://github.com/thaiscvaz
      params:
        icon: github
    - name: LinkedIn
      weight: 4
      url: https://linkedin.com/in/thacvaz
      params:
        icon: linkedin
    - name: Substack
      weight: 5
      url: https://vazdeng.substack.com
      params:
        icon: substack

params:
  description: "Engenharia de dados de produção. Agente de IA para cripto. Mestrado traduzido para a prática."
  author:
    name: Thais Vaz
    link: https://linkedin.com/in/thacvaz

  # SEO e verificações (descomentar e preencher quando disponível)
  # googleSiteVerification: ""   # Google Search Console: search.google.com/search-console
  # indieAuth: ""                # rel=me link (ex: https://github.com/thaiscvaz)

  # Cloudflare Web Analytics (gratis, sem cookie). Pegar o token em:
  # dash.cloudflare.com > Analytics & Logs > Web Analytics > Add site > copiar "token" do snippet.
  # cloudflareAnalyticsToken: ""

  # Metadados das series (label + cor + descricao curta usada na pagina da serie)
  series_meta:
    ia-foundations:
      label: "IA Foundations"
      color: sage
      sub: "Os fundamentos de engenharia de IA, um mecanismo por episódio."
      sub_en: "AI engineering fundamentals, one mechanism per episode."
    zero-to-expert:
      label: "Zero to Expert"
      color: lavender
      sub: "Fundamentos de engenharia de dados antes da ferramenta."
      sub_en: "Data engineering fundamentals before the tool."
    cripto-chronicles:
      label: "Cripto Chronicles"
      color: rose
      sub: "A saga do agente quant de cripto, capítulo a capítulo."
      sub_en: "The crypto quant agent saga, chapter by chapter."
    segundo-cerebro:
      label: "Segundo Cérebro"
      color: coral
      sub: "Seis anos de Zettelkasten operado por agentes de IA."
      sub_en: "Six years of Zettelkasten operated by AI agents."

  navbar:
    displayTitle: true
    displayLogo: false
    width: normal

  theme:
    default: dark
    displayToggle: true

  page:
    width: normal

  blog:
    list:
      displayTags: false
    article:
      displayPagination: true

  footer:
    displayCopyright: true
    displayPoweredBy: false

  # Busca desligada: o navbar custom nunca renderizou o componente e o
  # índice flexsearch era custo de build morto. Religar quando houver UI.
  search:
    enable: false

  # Custom assets
  customCSS:
    - css/custom.css

  images:
    - images/og-default.png

  # upcoming + tracks movidos pra languages.<lang>.params (i18n)

  # Mapping tag -> cor (pills coloridas no archive e cards relacionados)
  track_colors:
    data-engineering: amber
    batch: amber
    streaming: amber
    cripto: rose
    quant: rose
    zero-to-expert: lavender
    fundamentos: lavender
    ia: sage
    machine-learning: sage
    tool-verdict: coral
    airflow: coral
