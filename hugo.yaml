# Hugo config para o blog VazDEng.
# Cloudflare Pages é o host principal. GitHub Actions sobrescreve via --baseURL dinâmico.
# Local dev: --baseURL http://localhost:1313/
baseURL: https://vazdeng.pages.dev/
title: VazDEng
languageCode: pt-BR
defaultContentLanguage: pt
enableRobotsTXT: false  # static/robots.txt é a fonte da verdade
enableGitInfo: false

# Hextra via Hugo Modules
module:
  imports:
    - path: github.com/imfing/hextra

# Permalink estilo AkitaOnRails
permalinks:
  blog: /:year/:month/:day/:slug/

# Idiomas (sufixo de arquivo .en.md para inglês)
languages:
  pt:
    languageName: Português
    weight: 1
    params:
      upcoming:
        - date: "TER 02/06 12h"
          slug: "DE-008"
          title: "Schema drift na fronteira"
        - date: "QUI 04/06 12h"
          slug: "TV-002"
          title: "Dagster, sério?"
        - date: "SAB 06/06 10h"
          slug: "ZTE-002"
          title: "Ingestão na prática"
        - date: "SAB 06/06 14h"
          slug: "IA-002"
          title: "Embeddings sem hype"
      tracks:
        - color: amber
          label: "DE Produção"
          title: "Anti-padrões reais em batch e streaming."
          sub: "Decisão técnica com SLA no centro. Toda terça, 12h BRT."
          cta: "Ver últimos"
          sigil: "DE"
        - color: rose
          label: "Cripto Chronicles"
          title: "A saga de um agente quant que perde dinheiro."
          sub: "Capítulos numerados sobre o cripto_invest. Sharpe, abstenção, drawdown."
          cta: "Ler do começo"
          sigil: "CA"
        - color: lavender
          label: "Zero to Expert"
          title: "Fundamentos antes da ferramenta."
          sub: "Série didática progressiva de DE. Toda sábado, 10h BRT."
          cta: "Episódio 01"
          sigil: "ZTE"
  en:
    languageName: English
    weight: 2
    params:
      upcoming:
        - date: "TUE Jun 02 · 12h"
          slug: "DE-008"
          title: "Schema drift at the boundary"
        - date: "THU Jun 04 · 12h"
          slug: "TV-002"
          title: "Dagster, really?"
        - date: "SAT Jun 06 · 10h"
          slug: "ZTE-002"
          title: "Ingestion in practice"
        - date: "SAT Jun 06 · 14h"
          slug: "IA-002"
          title: "Embeddings without the hype"
      tracks:
        - color: amber
          label: "DE Production"
          title: "Real anti-patterns in batch and streaming."
          sub: "Technical decision with SLA at the center. Every Tuesday, 12h BRT."
          cta: "Latest posts"
          sigil: "DE"
        - color: rose
          label: "Crypto Chronicles"
          title: "The saga of a quant agent losing money."
          sub: "Numbered chapters on cripto_invest. Sharpe, abstention, drawdown."
          cta: "Start from chapter 1"
          sigil: "CA"
        - color: lavender
          label: "Zero to Expert"
          title: "Fundamentals before the tool."
          sub: "Progressive didactic series on DE. Every Saturday, 10h BRT."
          cta: "Episode 01"
          sigil: "ZTE"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

# RSS global + saídas
outputs:
  home: [html, rss]
  section: [html, rss]

menu:
  main:
    - name: Sobre
      pageRef: /sobre
      weight: 1
    - name: Busca
      weight: 2
      params:
        type: search
    - name: GitHub
      weight: 3
      url: https://github.com/thaiscvaz
      params:
        icon: github
    - name: LinkedIn
      weight: 4
      url: https://linkedin.com/in/thacvaz
      params:
        icon: linkedin
    - name: Substack
      weight: 5
      url: https://vazdeng.substack.com
      params:
        icon: substack

params:
  description: "Engenharia de dados de produção. Agente de IA para cripto. Mestrado traduzido para a prática."
  author:
    name: Thais Vaz
    link: https://linkedin.com/in/thacvaz

  # SEO e verificações (descomentar e preencher quando disponível)
  # googleSiteVerification: ""   # Google Search Console: search.google.com/search-console
  # indieAuth: ""                # rel=me link (ex: https://github.com/thaiscvaz)

  navbar:
    displayTitle: true
    displayLogo: false
    width: normal

  theme:
    default: light
    displayToggle: true

  page:
    width: normal

  blog:
    list:
      displayTags: false
    article:
      displayPagination: true

  footer:
    displayCopyright: true
    displayPoweredBy: false

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  # Custom assets
  customCSS:
    - css/custom.css

  images:
    - images/og-default.png

  # upcoming + tracks movidos pra languages.<lang>.params (i18n)

  # Mapping tag -> cor (pills coloridas no archive e cards relacionados)
  track_colors:
    data-engineering: amber
    batch: amber
    streaming: amber
    cripto: rose
    quant: rose
    zero-to-expert: lavender
    fundamentos: lavender
    ia: sage
    machine-learning: sage
    tool-verdict: coral
    airflow: coral
