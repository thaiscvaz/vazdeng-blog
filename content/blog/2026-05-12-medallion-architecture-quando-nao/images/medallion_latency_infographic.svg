<svg width="700" viewBox="0 0 700 268" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Cada camada custa tempo — Latência acumulada por camada</title>
<desc>Comparação de latência: pipeline Medallion com 80 minutos totais versus transformação direta com 15 minutos</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}</style>
</defs>

<rect width="700" height="268" fill="#1a2035"/>

<text x="270" y="27" text-anchor="middle" font-size="17" font-weight="600" fill="#f0ece2">Cada camada custa tempo</text>
<line x1="40" y1="36" x2="500" y2="36" stroke="#f0ece2" stroke-width="0.5" opacity="0.15"/>

<text x="40" y="54" font-size="10" fill="#f0ece2" opacity="0.4" letter-spacing="0.5">MEDALLION ARCHITECTURE</text>

<rect x="40" y="62" width="96" height="42" rx="5" fill="#1e2740" stroke="#f0ece2" stroke-width="1"/>
<text x="88" y="77" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#f0ece2">Bronze</text>
<text x="88" y="95" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#f0ece2" opacity="0.55">25 min</text>

<line x1="136" y1="83" x2="150" y2="83" stroke="#f0ece2" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="152" y="62" width="106" height="42" rx="5" fill="#1e2740" stroke="#f0ece2" stroke-width="1"/>
<text x="205" y="77" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#f0ece2">Silver</text>
<text x="205" y="95" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#f0ece2" opacity="0.55">30 min</text>

<line x1="258" y1="83" x2="272" y2="83" stroke="#f0ece2" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="274" y="62" width="96" height="42" rx="5" fill="#1e2740" stroke="#f0ece2" stroke-width="1"/>
<text x="322" y="77" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#f0ece2">Gold</text>
<text x="322" y="95" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#f0ece2" opacity="0.55">25 min</text>

<line x1="370" y1="83" x2="382" y2="83" stroke="#f0ece2" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="384" y="66" width="96" height="34" rx="17" fill="none" stroke="#f0ece2" stroke-width="1" opacity="0.45"/>
<text x="432" y="83" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#f0ece2" opacity="0.75">Dashboard</text>

<rect x="40" y="114" width="462" height="18" rx="3" fill="#f0ece2" opacity="0.05"/>
<rect x="40" y="114" width="462" height="18" rx="3" fill="#e07b30"/>
<text x="271" y="123" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#ffffff">80 minutos no total</text>

<text x="40" y="152" font-size="10" fill="#f0ece2" opacity="0.4" letter-spacing="0.5">TRANSFORMAÇÃO DIRETA</text>

<rect x="40" y="160" width="176" height="42" rx="5" fill="#1e2740" stroke="#2d6a4f" stroke-width="1.5"/>
<text x="128" y="175" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#f0ece2">Transformação direta</text>
<text x="128" y="193" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#f0ece2" opacity="0.55">15 min</text>

<line x1="216" y1="181" x2="230" y2="181" stroke="#f0ece2" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="232" y="164" width="96" height="34" rx="17" fill="none" stroke="#f0ece2" stroke-width="1" opacity="0.45"/>
<text x="280" y="181" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#f0ece2" opacity="0.75">Dashboard</text>

<rect x="40" y="212" width="462" height="18" rx="3" fill="#f0ece2" opacity="0.05"/>
<rect x="40" y="212" width="87" height="18" rx="3" fill="#2d6a4f"/>
<text x="135" y="221" text-anchor="start" dominant-baseline="central" font-size="11" fill="#f0ece2" opacity="0.65">15 minutos no total</text>

<rect x="514" y="106" width="148" height="130" rx="8" fill="#e07b30" fill-opacity="0.09" stroke="#e07b30" stroke-opacity="0.28" stroke-width="1"/>
<text x="588" y="160" text-anchor="middle" dominant-baseline="central" font-size="50" font-weight="700" fill="#e07b30">5×</text>
<text x="588" y="192" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#e07b30">mais rápido</text>

</svg>
